<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato Delivery Time Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Boxicons for modern elegant icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>
    <!-- Subtle dynamic background glowing sphere -->
    <div class="background-anim"></div>

    <div class="container">
        <!-- NAVBAR -->
        <nav class="navbar">
            <h1 class="logo"><i class='bx bxs-dish'></i> Zomato Delivery Time Predictor</h1>
        </nav>

        <!-- MAIN CARD -->
        <main class="card animate-pop-in">
            <div class="card-header">
                <h2>Estimate Delivery</h2>
                <p>Enter details below to get an AI-powered prediction.</p>
            </div>

            <form action="/predict" method="post" id="predict-form">

                <!-- Row 1: Rating & Distance -->
                <div class="form-row">
                    <div class="input-group">
                        <label for="rating"><i class='bx bxs-star'></i> Restaurant Rating</label>
                        <input type="number" step="0.1" min="0" max="5" id="rating" name="rating"
                            placeholder="e.g. 4.2"
                            value="{{ sel_rating if sel_rating is defined and sel_rating is not none else '' }}"
                            required>
                    </div>

                    <div class="input-group">
                        <label for="distance"><i class='bx bxs-map'></i> Distance (km)</label>
                        <input type="number" step="0.1" min="0" id="distance" name="distance"
                            placeholder="e.g. 3.5"
                            value="{{ sel_distance if sel_distance is defined and sel_distance is not none else '' }}"
                            required>
                    </div>
                </div>

                <!-- Row 2: Weather & Vehicle -->
                <div class="form-row">
                    <div class="input-group">
                        <label for="weather"><i class='bx bxs-cloud'></i> Weather</label>
                        <select id="weather" name="weather" required>
                            {% for opt in weather_options %}
                            <option value="{{ opt }}"
                                {% if sel_weather is defined and sel_weather == opt %}selected{% endif %}>
                                {{ opt | capitalize }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="vehicle"><i class='bx bxs-car'></i> Vehicle Used</label>
                        <select id="vehicle" name="vehicle" required>
                            {% for opt in vehicle_options %}
                            <option value="{{ opt }}"
                                {% if sel_vehicle is defined and sel_vehicle == opt %}selected{% endif %}>
                                {{ opt | replace('_', ' ') | capitalize }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <!-- Row 3: Traffic & City Type -->
                <div class="form-row">
                    <div class="input-group">
                        <label for="traffic"><i class='bx bxs-traffic'></i> Road Traffic</label>
                        <select id="traffic" name="traffic" required>
                            {% for opt in traffic_options %}
                            <option value="{{ opt }}"
                                {% if sel_traffic is defined and sel_traffic == opt %}selected{% endif %}>
                                {{ opt | capitalize }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="city"><i class='bx bxs-city'></i> City Type</label>
                        <select id="city" name="city" required>
                            {% for opt in city_options %}
                            <option value="{{ opt }}"
                                {% if sel_city is defined and sel_city == opt %}selected{% endif %}>
                                {{ opt | capitalize }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <!-- Row 4: Festival Toggle -->
                <div class="input-group festival-group">
                    <label for="festival-toggle"><i class='bx bxs-party'></i> Festival / Holiday?</label>
                    <div class="toggle-wrapper">
                        <span class="toggle-label">No</span>
                        <label class="switch">
                            <input type="checkbox" id="festival-toggle" name="festival" value="yes"
                                {% if sel_festival is defined and sel_festival == 'yes' %}checked{% endif %}>
                            <span class="slider"></span>
                        </label>
                        <span class="toggle-label">Yes</span>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submit-btn">
                    <span class="btn-text">Predict Delivery Time</span>
                    <i class='bx bx-right-arrow-alt icon-arrow'></i>
                </button>

            </form>

            <!-- Show Result if exists -->
            {% if prediction_text %}
            <div class="result fade-in {% if 'Invalid' in prediction_text %}error{% endif %}">
                <i class='bx {% if "Invalid" in prediction_text %}bx-error-circle{% else %}bxs-time-five{% endif %}'></i>
                <span>{{ prediction_text }}</span>
            </div>
            {% endif %}

            <!-- Show Chart if exists -->
            {% if chart_data %}
            <div class="chart-section fade-in">
                <h3 class="chart-title"><i class='bx bxs-bar-chart-alt-2'></i> Festival vs Normal Day</h3>
                <img src="data:image/png;base64,{{ chart_data }}" alt="Delivery comparison chart"
                     class="chart-img" id="comparison-chart">
                <div class="chart-legend">
                    <span class="legend-item"><span class="legend-dot normal"></span> Normal: {{ chart_normal }} min</span>
                    <span class="legend-item"><span class="legend-dot festival"></span> Festival: {{ chart_festival }} min</span>
                </div>
            </div>
            {% endif %}

        </main>
    </div>

    <!-- Micro-interactions Script -->
    <script>
        document.getElementById('predict-form').addEventListener('submit', function () {
            const btn = document.getElementById('submit-btn');
            btn.classList.add('loading');
            btn.innerHTML = "<i class='bx bx-loader-alt bx-spin'></i> <span>Estimating...</span>";
        });
    </script>
</body>

</html>
