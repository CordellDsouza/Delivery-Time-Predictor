<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato Delivery Time Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Boxicons for modern elegant icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>
    <!-- Subtle dynamic background glowing sphere -->
    <div class="background-anim"></div>

    <div class="container">
        <!-- NAVBAR -->
        <nav class="navbar">
            <h1 class="logo"><i class='bx bxs-dish'></i> Zomato Delivery Time Predictor</h1>
        </nav>

        <!-- MAIN CARD -->
        <main class="card animate-pop-in">
            <div class="card-header">
                <h2>Estimate Delivery</h2>
                <p>Enter details below to get an AI-powered prediction.</p>
            </div>

            <form action="/predict" method="post" id="predict-form">

                <div class="input-group">
                    <label for="rating"><i class='bx bxs-star'></i> Restaurant Rating</label>
                    <input type="number" step="0.1" min="0" max="5" id="rating" name="rating" placeholder="e.g. 4.2"
                        required>
                </div>

                <div class="input-group">
                    <label for="distance"><i class='bx bxs-map'></i> Distance (km)</label>
                    <input type="number" step="0.1" id="distance" name="distance" placeholder="e.g. 3.5" required>
                </div>

                <button type="submit" class="submit-btn" id="submit-btn">
                    <span class="btn-text">Predict Delivery Time</span>
                    <i class='bx bx-right-arrow-alt icon-arrow'></i>
                </button>

            </form>

            <!-- Show Result if exists -->
            {% if prediction_text %}
            <div class="result fade-in {% if 'Invalid' in prediction_text %}error{% endif %}">
                <i class='bx {% if ' Invalid' in prediction_text %}bx-error-circle{% else %}bxs-time-five{% endif
                    %}'></i>
                <span>{{ prediction_text }}</span>
            </div>
            {% endif %}

        </main>
    </div>

    <!-- Micro-interactions Script -->
    <script>
        document.getElementById('predict-form').addEventListener('submit', function () {
            const btn = document.getElementById('submit-btn');
            btn.classList.add('loading');
            btn.innerHTML = "<i class='bx bx-loader-alt bx-spin'></i> <span>Estimating...</span>";
        });
    </script>
</body>

</html>
